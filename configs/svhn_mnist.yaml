dataset:
  name: svhn_mnist
  img_size: 32
  channels: 3
  data_root: data/raw

model:
  ngf: 32
  ndf: 32
  n_blocks: 6
  n_downsample: 1
  n_layers_D: 2

training:
  epochs: 100
  lr: 0.0002
  batch_size: 4
  lambda_cycle: 10.0
  lambda_identity: 5.0
  decay_epoch: 50
  pool_size: 50
  vis_freq: 10
  save_freq: 20
